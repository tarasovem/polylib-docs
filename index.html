<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Polylib Docs — Документация Web Components</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Polylib — минималистичная библиотека для разработки Web Components">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* Кастомные стили для документации */
    :root {
      --theme-color: #42b983;
    }
    
    /* Блок с CodePen */
    .codepen {
      border-radius: 8px;
      overflow: hidden;
    }
    
    /* Навигация */
    .sidebar-nav > ul > li > a {
      font-weight: 600;
    }
    
    /* Заметки */
    .custom-block.tip {
      border-color: #42b983;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Polylib',
      repo: 'https://github.com/polylib/polylib',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Поиск...',
        noData: 'Ничего не найдено',
        depth: 3
      },
      copyCode: {
        buttonText: 'Копировать',
        errorText: 'Ошибка',
        successText: 'Скопировано!'
      },
      pagination: {
        previous: 'Назад',
        next: 'Далее',
        crossChapter: true
      },
      footer: {
        copy: '<span id="footer-year"></span> &copy; Polylib',
        auth: false,
        pre: '<hr>',
        style: 'center'
      },
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      }
    };

    // Автоматический год в footer
    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Плагины -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs/dist/docsify-tabs.min.js"></script>
</body>
</html>
